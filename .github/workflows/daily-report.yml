name: Verse8 Discord Daily Report

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      force_send:
        description: "Ignore once-per-day guard"
        required: false
        default: "false"

jobs:
  run-daily-report:
    concurrency:
      group: verse8-daily-report
      cancel-in-progress: true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh latest send state from main
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- .state/last_sent_date_kst.txt || true
          echo "Current send state:"
          cat .state/last_sent_date_kst.txt 2>/dev/null || echo "(missing)"

      - name: Run report bot
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

          # LLM provider: gemini (default) or openai
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'gemini' }}

          # Gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash-lite' }}

          # OpenAI (used only when LLM_PROVIDER=openai)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1' }}

          WINDOW_HOURS: ${{ vars.WINDOW_HOURS || '24' }}
          MAX_MESSAGES_PER_CHANNEL: ${{ vars.MAX_MESSAGES_PER_CHANNEL || '180' }}
          MAX_MESSAGES_FOR_LLM_PER_CHANNEL: ${{ vars.MAX_MESSAGES_FOR_LLM_PER_CHANNEL || '60' }}
          # Optional: stop after a specific KST date (YYYY-MM-DD)
          RUN_UNTIL_DATE: ${{ vars.RUN_UNTIL_DATE || '' }}
          SEND_ONCE_PER_DAY: ${{ vars.SEND_ONCE_PER_DAY || 'true' }}
          SEND_STATE_FILE: ${{ vars.SEND_STATE_FILE || '.state/last_sent_date_kst.txt' }}
          SEND_NOT_BEFORE_KST: '09:30'
          FORCE_SEND: ${{ inputs.force_send || vars.FORCE_SEND || 'false' }}
          # Optional override example:
          # DISCORD_CHANNELS_JSON: ${{ vars.DISCORD_CHANNELS_JSON }}
        run: python src/main.py

      - name: Persist daily send state
        if: success()
        run: |
          if git diff --quiet -- .state/last_sent_date_kst.txt; then
            echo "No send-state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .state/last_sent_date_kst.txt
          git commit -m "chore: update daily send state [skip ci]" || true
          git pull --rebase origin main
          git push
